description = "✍️ Pair every drafted document with a Word (.docx) file. When the attorney asks for a draft — complaint, motion, brief, memorandum, retainer agreement, demand letter, discovery request, advisory note — produce BOTH the markdown AND the .docx in the same directory. Word is what courts accept and what clients open. Markdown is what the firm reads and diffs."

prompt = """
# ✍️ Draft-With-Docx — USA AI Brain

The attorney said:

\"\"\"
{{args}}
\"\"\"

You are producing a legal document for the attorney's matter. The firm's standing rule: every drafted document ships as a paired `.md` + `.docx` in the same directory, atomically. Markdown for the firm, Word for the court and the client.

## Step 1 — Detect the document type

Identify what the attorney is asking you to draft:
- Pleadings (complaint, answer, counterclaim, cross-claim, third-party complaint, reply)
- Motions (12(b)(6), Rule 56 summary judgment, motion to compel, motion in limine, Rule 65 TRO/PI)
- Briefs & memoranda (memorandum of law, appellate brief under FRAP, trial brief)
- Discovery (interrogatories, requests for production, requests for admission — Rules 26–36)
- Affidavits & declarations (28 U.S.C. § 1746 declaration, verification, certification)
- Transactional (retainer/engagement agreement, NDA, contract, operating agreement, term sheet)
- Notices & letters (demand letter, cease-and-desist, notice of appearance, meet-and-confer)
- Advisory notes, legal opinions, due-diligence memoranda
- Certificate of service, proposed order, notice of motion

## Step 2 — Locate the matter folder

Find the matter folder under `~/Desktop/<firm-name>/<matter-folder>/`. If a `drafts/` subdir doesn't exist, create it:

!{mkdir -p drafts}

## Step 3 — Write the markdown draft

Produce the draft as markdown with a date-prefixed filename:

```
drafts/YYYY-MM-DD-<short-title>.md
```

## Step 4 — Pair with .docx (MANDATORY — same tool call window)

Convert the .md to .docx in the same directory:

!{pandoc "drafts/$(ls -t drafts/*.md | head -1 | xargs basename)" -o "drafts/$(ls -t drafts/*.md | head -1 | xargs basename .md).docx" --from=markdown+pipe_tables+yaml_metadata_block 2>&1 || echo "pandoc-missing"}

If pandoc reports missing, fall back:

!{python3 -c "import pypandoc, glob, os; latest = max(glob.glob('drafts/*.md'), key=os.path.getmtime); pypandoc.convert_file(latest, 'docx', outputfile=latest.replace('.md', '.docx'))" 2>&1}

## Step 5 — Verify both files exist

!{ls -la drafts/*.md drafts/*.docx | tail -4}

## Step 6 — Report to attorney

Tell the attorney:

> ✍️ Draft ready (paired):
> - `drafts/YYYY-MM-DD-<title>.md` — for the firm + diffs
> - `drafts/YYYY-MM-DD-<title>.docx` — for the registry + client

NEVER report "draft ready" if only one of the two files exists.

## Why this rule

- US courts accept Word, not markdown. Markdown-only = unfileable.
- Clients open Word. Markdown-only = unsendable.
- The firm's brain reads markdown. Docx-only = opaque to search and diff.

Both files, every time, same directory.
"""
